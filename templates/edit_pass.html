{% extends 'base.html' %}

{% block title %}MealFlow – Change Password{% endblock %}

{% block content %}

<div class="text-center mb-5">
  <h1 class="fw-bold text-success mt-3 mb-3">Change Password</h1>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-success shadow-sm rounded-4">
      <div class="card-body p-4 p-md-5">

        <form method="POST">
          {% csrf_token %}

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} rounded-3" role="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Old Password</label>
            <input type="password" name="current_password" class="form-control" placeholder="Enter your old password" required>
          </div>

          <hr class="border-2">

          <div class="mb-3 mt-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" name="new_password" class="form-control" placeholder="Enter your new password" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm your new password" required>
          </div>

          <div class="d-flex flex-column flex-sm-row gap-3 mt-4">
            <a href="{% url 'dashboard' %}"
              class="btn btn-outline-secondary btn-lg rounded-pill fw-semibold shadow-sm w-100 w-sm-50 text-center">
              Back to Dashboard
            </a>
            <button type="submit"
              class="btn btn-success btn-lg rounded-pill fw-semibold shadow-sm w-100 w-sm-50">
              Update Password
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>

{% endblock %}
