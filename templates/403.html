<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Forbidden | MealFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f7faf8;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    .error-card {
      background: white;
      border: 1px solid #e2ebd5;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(29, 158, 117, 0.05);
      max-width: 500px;
      width: 100%;
      text-align: center;
      padding: 40px;
    }
    .error-icon {
      font-size: 5rem;
      color: #f59e0b;
      margin-bottom: 20px;
    }
    .btn-home {
      background-color: #1D9E75;
      color: white;
      font-weight: 600;
      border-radius: 12px;
      padding: 12px 24px;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }
    .btn-home:hover {
      background-color: #146e52;
      color: white;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">
      <i class="bi bi-shield-slash-fill"></i>
    </div>
    <h1 class="fw-bold mb-2">403</h1>
    <h3 class="fw-semibold text-secondary mb-3">Access Denied</h3>
    <p class="text-muted mb-4">
      Sorry, you do not have permission to access this page or your session token has expired. If you just logged in, try clearing your browser cookies.
    </p>
    <a href="/" class="btn-home w-100">
      Back to Home <i class="bi bi-house-door-fill ms-2"></i>
    </a>
  </div>
</body>
</html>
