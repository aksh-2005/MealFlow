<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MealFlow{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background-color: #f6fdf7; }
    .navbar-brand { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
    .step-number  { font-size: 2.8rem; font-weight: 800; line-height: 1; }
    .stat-num     { font-size: 1.8rem; font-weight: 800; }
    .meal-thumb   { height: 220px; background: linear-gradient(135deg,#c8e6cc,#28a745); font-size: 4.5rem; }
    .testi-quote  { font-size: 2.5rem; line-height: 1; }
    .hero-title   { font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 800; line-height: 1.15; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm sticky-top py-3">
  <div class="container">

    <a class="navbar-brand text-success" href="{% url 'home' %}">
      Meal<span class="text-dark">Flow</span>
    </a>

    <button class="navbar-toggler border-0" type="button"
      data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav mx-auto gap-1 mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link fw-semibold px-3 rounded" href="{% url 'home' %}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-semibold px-3 rounded" href="{% url 'plans' %}">Meal Plans</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-semibold px-3 rounded" href="{% url 'contact_us' %}">Contact Us</a>
        </li>
      </ul>

      <div class="d-flex gap-2 align-items-center">
        {% if request.user.is_authenticated %}
          <a href="{% url 'logout' %}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">Log Out</a>
          <a href="{% url 'dashboard' %}" class="btn btn-success btn-sm rounded-pill px-4 fw-semibold">Dashboard</a>
        {% else %}
          <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">Log In</a>
          <a href="{% url 'register' %}" class="btn btn-success btn-sm rounded-pill px-4 fw-semibold">Register</a>
        {% endif %}
      </div>
    </div>

  </div>
</nav>

<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
