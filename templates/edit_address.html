{% extends 'base.html' %}

{% block title %}MealFlow – Edit Address{% endblock %}

{% block content %}

<div class="text-center mb-5 mt-3">
  <h1 class="fw-bold text-success">Edit Address</h1>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-success shadow-sm rounded-4">
      <div class="card-body p-4 p-md-5">

        <form method="POST">
          {% csrf_token %}

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} rounded-3" role="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}

          <div class="mb-4">
            <label class="form-label fw-semibold">Address</label>
            <textarea name="address" class="form-control" rows="4"
              placeholder="Enter your full address" required>{{ profile.address }}</textarea>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Pincode</label>
            <input type="text" name="pincode" class="form-control"
              value="{{ profile.pincode }}"
              placeholder="6-digit pincode"
              maxlength="6" required>
          </div>

          <div class="d-flex gap-3 mt-3">
            <a href="{% url 'dashboard' %}"
              class="btn btn-outline-secondary btn-lg rounded-pill fw-semibold shadow-sm w-50">
              Back to Dashboard
            </a>
            <button type="submit"
              class="btn btn-success btn-lg rounded-pill fw-semibold shadow-sm w-50">
              Save Address
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>

{% endblock %}
