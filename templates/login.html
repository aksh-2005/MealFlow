{% extends 'base.html' %}

{% block title %}Login | MealFlow{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <!-- Heading -->
      <div class="text-center mb-4">
        <h1 class="fw-bold text-success">MealFlow</h1>
        <p class="text-muted">Healthy meals delivered daily</p>
      </div>

      <!-- Login Card -->
      <div class="card border-success shadow-sm rounded-4">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <h3 class="fw-bold">Welcome Back</h3>
            <p class="text-muted small">
              Sign in to manage your meal subscription
            </p>
          </div>

          <!-- Error Alert -->
          {% if error %}
          <div class="alert alert-danger mb-4">{{ error }}</div>
          {% endif %}

          <!-- Form -->
          <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-white">
                  <i class="bi bi-person text-success"></i>
                </span>
                <input
                  type="text"
                  name="username"
                  class="form-control"
                  placeholder="Enter username"
                  required
                />
              </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white">
                  <i class="bi bi-lock text-success"></i>
                </span>
                <input
                  type="password"
                  name="password"
                  class="form-control"
                  placeholder="Enter password"
                  required
                />
              </div>
            </div>

            <!-- Login Button -->
            <button
              type="submit"
              class="btn btn-success w-100 py-2 fw-semibold rounded-3"
            >
              Log In
            </button>
          </form>

          <!-- Register link -->
          <div class="text-center mt-4">
            <small class="text-muted">Don't have an account?</small>
            <a href="{% url 'register' %}" class="text-success text-decoration-none fw-semibold">
              Register
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
